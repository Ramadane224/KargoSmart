{% if page_obj.has_other_pages %}
<nav class="mt-6 inline-flex items-center justify-center gap-2">
    {% if page_obj.has_previous %}
        <a href="?page={{ page_obj.previous_page_number }}" class="rounded-md border border-slate-300 bg-white px-3 py-2 text-sm text-slate-700 hover:bg-slate-50">Précédent</a>
    {% else %}
        <span class="rounded-md border border-slate-200 bg-slate-100 px-3 py-2 text-sm text-slate-400">Précédent</span>
    {% endif %}
    <span class="px-3 py-2 text-sm text-slate-700">Page {{ page_obj.number }} sur {{ page_obj.paginator.num_pages }}</span>
    {% if page_obj.has_next %}
        <a href="?page={{ page_obj.next_page_number }}" class="rounded-md border border-slate-300 bg-white px-3 py-2 text-sm text-slate-700 hover:bg-slate-50">Suivant</a>
    {% else %}
        <span class="rounded-md border border-slate-200 bg-slate-100 px-3 py-2 text-sm text-slate-400">Suivant</span>
    {% endif %}
</nav>
{% endif %}
